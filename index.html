<script>
// TYPING EFFECT
let text = "jayendra mahecha";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,100);
    }
}
typing();
